[project]
name = "nshedd"
r_version = "4.5"

# Optional: base URL for `rv add owner/repo` shorthand (defaults to https://github.com).
# git_shorthand_base_url = "https://github.example.com"
# A list of repositories to fetch packages from. Order matters: we will try to get a package from each repository in order.
# The alias is only used in this file if you want to specifically require a dependency to come from a certain repository.
# Example: { alias = "PPM", url = "https://packagemanager.posit.co/cran/latest" },
repositories = [
    {alias = "PPM", url = "https://packagemanager.posit.co/cran/__linux__/noble/latest"},
    {alias = "BioCsoft", url = "https://packagemanager.posit.co/bioconductor/__linux__/noble/packages/3.21/bioc"},
    {alias = "BioCann", url = "https://packagemanager.posit.co/bioconductor/__linux__/noble/packages/3.21/data/annotation"},
    {alias = "BioCexp", url = "https://packagemanager.posit.co/bioconductor/__linux__/noble/packages/3.21/data/experiment"},
]

# A list of packages to install and any additional configuration
# Examples:
    # "dplyr",
    # {name = "dplyr", repository = "CRAN"},
    # {name = "dplyr", git = "https://github.com/tidyverse/dplyr.git", tag = "v1.1.4"},
dependencies = [
    "devtools",
    "wordcloud",
    "dplyr",
    "ggplot2",
    "cowplot",
    "magick",
    "scales",
    "gridExtra",
    "openxlsx",
    "rGREAT",
]
